services:
  - type: web
    name: veyron-pos
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /healthz
    disk:
      name: veyron-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: SQLITE_DATABASE_PATH
        value: /data/pos.db
      - key: PRODUCT_IMAGES_DIR
        value: /data/images/products
      - key: BACKUP_DIR
        value: /data/backups
      - key: ALERT_TO_EMAIL
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
